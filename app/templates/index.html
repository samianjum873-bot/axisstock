
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStock PRO | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab { display: none; } .active-tab { display: block; }
        .sidebar-link.active { background: #312e81; border-right: 4px solid #facc15; }
        .modal { display: none; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); overflow-y: auto; padding: 20px 0; }
        .modal.active { display: flex; }
        .hidden-field { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .blink-danger { animation: blinker 1s linear infinite; background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; cursor: pointer; }
        @keyframes blinker { 50% { opacity: 0.6; } }
    
    </style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden font-sans">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-indigo-950 text-white flex flex-col shadow-2xl z-50">
        <div class="p-6 border-b border-indigo-900">
            <h1 class="text-xl font-black italic uppercase text-yellow-400">EduStock <span class="text-white">PRO</span></h1>
        </div>
        <nav class="flex-1 mt-6 px-4 space-y-2">
            <button onclick="showTab('pos')" id="link-pos" class="sidebar-link active w-full flex items-center p-4 rounded-xl transition hover:bg-indigo-900">
                <i class="fas fa-shopping-cart w-8"></i> <span class="font-bold text-xs">SALE TERMINAL (F1)</span>
            </button>
            <button onclick="showTab('inventory')" id="link-inventory" class="sidebar-link w-full flex items-center p-4 rounded-xl transition hover:bg-indigo-900">
                <i class="fas fa-box-open w-8"></i> <span class="font-bold text-xs">STOCK MANAGER (F2)</span>
            </button>
        </nav>
        <div class="p-4 border-t border-indigo-900">
            <a href="/logout" class="flex items-center p-4 w-full text-rose-400 font-black hover:bg-rose-500/10 rounded-xl transition">
                <i class="fas fa-power-off w-8"></i> LOGOUT
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <div class="flex items-center bg-slate-100 rounded-xl px-4 py-1.5 w-1/2 border">
                <i class="fas fa-search text-slate-400 mr-3 text-sm"></i>
                <input type="text" id="globalSearch" onkeyup="masterFilter()" placeholder="Quick Search (F1 to focus)..." class="bg-transparent w-full outline-none font-bold text-slate-700 text-sm">
            </div>
            <div class="flex items-center space-x-4">
                 <button onclick="toggleModal(true)" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-black text-xs shadow-lg hover:bg-indigo-700 transition tracking-widest uppercase">
                    + Add Inventory (F3)
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6">
            
            <!-- INVENTORY ANALYTICS (NOW ON TOP) -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-indigo-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Total Stock Value</p>
                    <h3 id="statValue" class="text-xl font-black text-slate-800 italic">Rs. 0</h3>
                </div>
                <div id="lowStockCard" onclick="filterLowStock()" class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-rose-500 transition-all">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Low Stock Alert</p>
                    <h3 id="statLow" class="text-xl font-black text-rose-600 italic">0 Items</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Today's Profit</p>
                    <h3 id="statProfit" class="text-xl font-black text-emerald-600 italic">Rs. 0</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-amber-500">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Pending Udhaar</p>
                    <h3 id="statUdhaar" class="text-xl font-black text-amber-700 italic">Rs. 0</h3>
                </div>
            </div>

            <!-- TABS CONTENT -->
            <div id="pos" class="tab active-tab">
                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-12 lg:col-span-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="productGrid"></div>
                    </div>
                    <div class="col-span-12 lg:col-span-4">
                        <div class="bg-white rounded-3xl shadow-xl p-6 sticky top-0 border">
                            <h2 class="font-black text-lg mb-4 flex justify-between">CHECKOUT <span id="cartCount" class="text-indigo-600">0</span></h2>
                            <div id="cartItems" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
                            <div class="bg-slate-900 text-yellow-400 p-4 rounded-xl mb-4">
                                <p class="text-[10px] uppercase font-bold opacity-70">Total Bill</p>
                                <p class="text-3xl font-black font-mono">Rs. <span id="orderTotal">0</span></p>
                            </div>
                            <input type="text" id="custName" placeholder="Parent Name" class="w-full border p-3 rounded-xl mb-3 font-bold">
                            <button onclick="completeSale()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-emerald-700 uppercase">Print & Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="inventory" class="tab">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                         <div class="flex space-x-2">
                             <select id="filterCat" onchange="toggleSubFilters(); masterFilter();" class="border text-[10px] p-2 rounded-lg font-black uppercase">
                                 <option value="">All Categories</option>
                                 <option value="Stationery">Stationery</option>
                                 <option value="Book">Course Books</option>
                                 <option value="Notebook">Notebooks</option>
                             </select>
                             <input type="text" id="filterClass" onkeyup="masterFilter()" placeholder="Filter Class..." class="hidden border text-[10px] p-2 rounded-lg font-bold uppercase w-24">
                             <input type="text" id="filterSubject" onkeyup="masterFilter()" placeholder="Filter Subject..." class="hidden border text-[10px] p-2 rounded-lg font-bold uppercase w-32">
                         </div>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase">
                            <tr><th class="p-4">Item</th><th class="p-4">Category</th><th class="p-4">Specs</th><th class="p-4">Prices</th><th class="p-4 text-center">Stock</th></tr>
                        </thead>
                        <tbody id="inventoryTableBody" class="text-sm font-bold"></tbody>
                    </table>
                    <div class="p-4 bg-slate-50 border-t flex justify-between items-center text-[10px] font-black uppercase text-slate-400">
                        <span id="pageInfo">Items</span>
                        <div class="flex space-x-1">
                            <button onclick="changePage(-1)" class="px-3 py-1 border bg-white rounded shadow-sm">Prev</button>
                            <button onclick="changePage(1)" class="px-3 py-1 border bg-white rounded shadow-sm">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SMART MODAL (WAPIS TERA WALA) -->
    <div id="addModal" class="modal fixed inset-0 z-[100] items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl w-[90%] max-w-2xl overflow-hidden border-4 border-indigo-950">
            <div class="bg-indigo-950 p-5 text-white flex justify-between items-center">
                <h3 class="text-xl font-black uppercase italic">Inventory Logic System</h3>
                <button onclick="toggleModal(false)" class="text-2xl">&times;</button>
            </div>
            
            <div id="existingAlert" class="hidden bg-amber-50 border-l-[10px] border-amber-500 p-4 m-4 rounded-lg">
                <p class="font-black text-amber-900 text-xs uppercase mb-2 italic">⚠️ Item already in system! Choose Action:</p>
                <div class="flex gap-2">
                    <button type="button" onclick="setEntryMode(false)" id="btnMerge" class="flex-1 p-2 rounded bg-amber-500 text-white font-black text-[10px] uppercase">Update Old</button>
                    <button type="button" onclick="setEntryMode(true)" id="btnSeparate" class="flex-1 p-2 rounded bg-indigo-600 text-white font-black text-[10px] uppercase">New Entry</button>
                </div>
            </div>

            <form id="addProdForm" class="p-6 space-y-4">
                <input type="hidden" name="mode" id="formMode" value="new">
                <input type="hidden" name="prod_id" id="prod_id">
                <input type="hidden" name="force_new" id="forceNew" value="false">

                <div class="grid grid-cols-2 gap-4">
                    <select name="cat" id="catSelect" onchange="handleCatChange()" class="border-2 p-3 rounded-xl font-black bg-indigo-50 border-indigo-100">
                        <option value="Stationery">Stationery</option>
                        <option value="Book">Course Book</option>
                        <option value="Notebook">Notebook</option>
                    </select>
                    <div id="statItemNameField">
                        <input type="text" id="statName" onkeyup="checkDuplicate()" placeholder="Item Name (e.g. Sharpener)" class="w-full border-2 p-3 rounded-xl font-bold">
                    </div>
                </div>

                <div id="stationeryFields" class="grid grid-cols-3 gap-2">
                    <input type="text" id="statBrand" onkeyup="checkDuplicate()" placeholder="Brand" class="border p-2 rounded-lg text-sm font-bold">
                    <input type="text" id="statColor" onkeyup="checkDuplicate()" placeholder="Color" class="border p-2 rounded-lg text-sm font-bold">
                    <input type="text" id="statType" onkeyup="checkDuplicate()" placeholder="Size" class="border p-2 rounded-lg text-sm font-bold">
                </div>

                <div id="bookFields" class="hidden-field grid grid-cols-3 gap-2">
                    <input type="text" id="bookClass" onkeyup="checkDuplicate()" placeholder="Class" class="border p-2 rounded-lg text-sm font-bold">
                    <input type="text" id="bookName" onkeyup="checkDuplicate()" placeholder="Subject" class="col-span-2 border p-2 rounded-lg text-sm font-bold">
                </div>

                <div class="bg-indigo-900 p-4 rounded-2xl grid grid-cols-2 gap-3">
                    <input type="number" name="stock" id="totalQty" onkeyup="calcPrices()" placeholder="Qty" class="p-3 rounded-lg font-black text-lg">
                    <input type="number" id="totalBuy" onkeyup="calcPrices()" placeholder="Total Bill" class="p-3 rounded-lg font-black text-lg">
                    <input type="number" step="any" name="p_price" id="perItemCost" class="p-3 rounded-lg font-black text-lg bg-indigo-800 text-white" readonly placeholder="Cost">
                    <input type="number" name="s_price" id="perItemSell" placeholder="Sell Price" class="p-3 rounded-lg font-black text-lg border-2 border-yellow-400">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-xl shadow-xl uppercase">Confirm Entry ✅</button>
            </form>
        </div>
    </div>

    <script>
        let inventory = []; let filteredData = []; let currentPage = 1; let cart = [];
        const itemsPerPage = 25;

        async function refreshData() {
            const res = await fetch('/api/inventory');
            inventory = await res.json();
            const statRes = await fetch('/api/v2/analytics');
            const stats = await statRes.json();
            
            document.getElementById('statValue').innerText = `Rs. ${stats.stock_value.toLocaleString()}`;
            document.getElementById('statLow').innerText = `${stats.low_stock} Items`;
            document.getElementById('statProfit').innerText = `Rs. ${stats.profit_today.toLocaleString()}`;
            document.getElementById('statUdhaar').innerText = `Rs. ${stats.udhaar.toLocaleString()}`;
            
            masterFilter(); updateAlerts();
        }

        function toggleSubFilters() {
            const cat = document.getElementById('filterCat').value;
            const showSub = (cat === 'Book' || cat === 'Notebook');
            document.getElementById('filterClass').classList.toggle('hidden', !showSub);
            document.getElementById('filterSubject').classList.toggle('hidden', !showSub);
            if(!showSub) {
                document.getElementById('filterClass').value = "";
                document.getElementById('filterSubject').value = "";
            }
        }

        function masterFilter() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            const cat = document.getElementById('filterCat').value;
            const cls = document.getElementById('filterClass').value.toLowerCase();
            const sub = document.getElementById('filterSubject').value.toLowerCase();
            
            filteredData = inventory.filter(p => {
                const searchStr = `${p.name} ${p.tag} ${p.student_class} ${p.category}`.toLowerCase();
                const matchQuery = searchStr.includes(q);
                const matchCat = (cat === "" || p.category === cat);
                const matchClass = (cls === "" || (p.student_class && p.student_class.toLowerCase().includes(cls)));
                const matchSub = (sub === "" || (p.subject && p.subject.toLowerCase().includes(sub)));
                
                return matchQuery && matchCat && matchClass && matchSub;
            });
            currentPage = 1; renderAll();
        }

        function renderAll() {
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = filteredData.slice(start, start + itemsPerPage);

            document.getElementById('inventoryTableBody').innerHTML = paginated.map(p => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-4"><div>${p.name}</div><div class="text-[10px] text-slate-400">#${p.id}</div></td>
                    <td class="p-4"><span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-[10px] uppercase font-black">${p.category}</span></td>
                    <td class="p-4 text-xs italic text-slate-500">${p.tag || ('Class ' + p.student_class)}</td>
                    <td class="p-4"><div>Sell: Rs. ${p.selling_price}</div><div class="text-[10px] text-slate-400">Cost: ${p.purchase_price}</div></td>
                    <td class="p-4 text-center"><div class="px-3 py-1 rounded-lg font-black ${p.stock < 10 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-700'}">${p.stock}</div></td>
                </tr>`).join('');

            document.getElementById('productGrid').innerHTML = paginated.map(p => `
                <div onclick="addToCart(${p.id})" class="bg-white p-4 rounded-2xl border-2 border-transparent hover:border-indigo-500 transition cursor-pointer shadow-sm relative">
                    <div class="text-[8px] font-black uppercase text-slate-400 mb-1">${p.category}</div>
                    <h3 class="font-black text-sm uppercase">${p.name}</h3>
                    <p class="text-[10px] text-slate-400">${p.tag || ('Class ' + p.student_class)}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="font-black text-indigo-600">Rs. ${p.selling_price}</span>
                        <span class="text-[10px] font-bold ${p.stock < 5 ? 'text-rose-500':'text-slate-400'}">Stk: ${p.stock}</span>
                    </div>
                </div>`).join('');

            document.getElementById('pageInfo').innerText = `Showing ${start+1}-${Math.min(start+itemsPerPage, filteredData.length)} of ${filteredData.length}`;
        }

        // --- THE LEGENDARY FORM LOGICS (RESTORED) ---
        function handleCatChange() {
            const cat = document.getElementById('catSelect').value;
            document.getElementById('stationeryFields').classList.toggle('hidden-field', cat !== 'Stationery');
            document.getElementById('statItemNameField').classList.toggle('hidden-field', cat !== 'Stationery');
            document.getElementById('bookFields').classList.toggle('hidden-field', cat === 'Stationery');
            
            // Adjust placeholders based on selection
            if(cat === 'Notebook') {
                document.getElementById('bookClass').placeholder = "Class (Notebook)";
                document.getElementById('bookName').placeholder = "Notebook Type / Subject";
            } else {
                document.getElementById('bookClass').placeholder = "Class";
                document.getElementById('bookName').placeholder = "Subject";
            }
            checkDuplicate();
        }

        async function checkDuplicate() {
            const cat = document.getElementById('catSelect').value;
            let query = "";
            if(cat === 'Stationery') {
                const name = document.getElementById('statName').value;
                const tag = `${document.getElementById('statBrand').value} ${document.getElementById('statColor').value} ${document.getElementById('statType').value}`.trim();
                if(name.length < 2) return document.getElementById('existingAlert').classList.add('hidden');
                query = `name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}`;
            } else {
                const name = document.getElementById('bookName').value;
                const s_class = document.getElementById('bookClass').value;
                if(!name || !s_class) return document.getElementById('existingAlert').classList.add('hidden');
                query = `name=${encodeURIComponent(name)}&s_class=${encodeURIComponent(s_class)}`;
            }
            const res = await fetch(`/api/products/check-existing?${query}`);
            const data = await res.json();
            const alertBox = document.getElementById('existingAlert');
            if(data.id) {
                alertBox.classList.remove('hidden');
                document.getElementById('prod_id').value = data.id;
                document.getElementById('perItemSell').value = data.selling_price;
                setEntryMode(false);
            } else {
                alertBox.classList.add('hidden');
                setEntryMode(true);
            }
        }

        function setEntryMode(isNew) {
            document.getElementById('forceNew').value = isNew;
            document.getElementById('formMode').value = isNew ? 'new' : 'update';
            document.getElementById('submitBtn').innerText = isNew ? "Save New Entry ✅" : "Update Old Stock 🔄";
            document.getElementById('submitBtn').className = isNew ? "w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-xl" : "w-full bg-amber-500 text-white py-4 rounded-xl font-black text-xl";
        }

        function calcPrices() {
            const bill = parseFloat(document.getElementById('totalBuy').value) || 0;
            const qty = parseInt(document.getElementById('totalQty').value) || 1;
            document.getElementById('perItemCost').value = (bill / qty).toFixed(2);
        }

        document.getElementById('addProdForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const cat = document.getElementById('catSelect').value;
            if(cat === 'Stationery') {
                fd.set('name', document.getElementById('statName').value);
                fd.set('tag', `${document.getElementById('statBrand').value} ${document.getElementById('statColor').value} ${document.getElementById('statType').value}`.trim());
            } else {
                fd.set('name', document.getElementById('bookName').value);
                fd.set('s_class', document.getElementById('bookClass').value);
            }
            await fetch('/api/products/smart-add', {method: 'POST', body: fd});
            toggleModal(false); refreshData();
        };

        // --- UI & TAB HELPERS ---
        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            document.getElementById('link-'+id).classList.add('active');
        }
        function toggleModal(show) { 
            document.getElementById('addModal').classList.toggle('active', show);
            if(!show) document.getElementById('addProdForm').reset();
        }
        function changePage(dir) {
            const max = Math.ceil(filteredData.length / itemsPerPage);
            if(currentPage + dir >= 1 && currentPage + dir <= max) { currentPage += dir; renderAll(); }
        }
        function addToCart(id) {
            const i = inventory.find(p => p.id === id);
            if(i.stock <= 0) return alert("No Stock!");
            cart.push({...i}); updateCartUI();
        }
        function updateCartUI() {
            document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border text-xs">
                    <span class="font-bold">${i.name}</span>
                    <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-rose-500 font-black px-2">&times;</button>
                </div>`).join('');
            document.getElementById('orderTotal').innerText = cart.reduce((a,b) => a + b.selling_price, 0);
            document.getElementById('cartCount').innerText = cart.length;
        }
        async function completeSale() {
            if(!cart.length) return;
            const fd = new FormData();
            fd.append('p_name', document.getElementById('custName').value || 'Cash Parent');
            fd.append('p_phone', '0000');
            fd.append('items_json', JSON.stringify(cart.map(i => ({...i, qty:1}))));
            fd.append('total', document.getElementById('orderTotal').innerText);
            fd.append('status', 'Paid');
            await fetch('/api/checkout', {method:'POST', body:fd});
            cart = []; updateCartUI(); refreshData();
        }

        window.addEventListener('keydown', (e) => {
            if(e.key === 'F1') { e.preventDefault(); showTab('pos'); document.getElementById('globalSearch').focus(); }
            if(e.key === 'F2') { e.preventDefault(); showTab('inventory'); }
            if(e.key === 'F3') { e.preventDefault(); toggleModal(true); }
        });

        
        function filterLowStock() {
            showTab('inventory');
            const lowItems = inventory.filter(p => {
                // Assuming max capacity is double the initial or we use a threshold
                // Since DB doesn't have 'max_stock', we use 10 as hard limit or 30% of a standard box (e.g. 50)
                // Par tere case mein hum 10 units ko hi 30% threshold maan kar chalte hain ya logic change krte hain
                return p.stock < 10; 
            });
            document.getElementById('globalSearch').value = ""; // Clear search
            filteredData = lowItems;
            currentPage = 1;
            renderAll();
            document.getElementById('globalSearch').placeholder = "VIEWING LOW STOCK ITEMS...";
        }

        async function updateAlerts() {
            const card = document.getElementById('lowStockCard');
            const countText = document.getElementById('statLow').innerText;
            const count = parseInt(countText);
            
            if (count > 0) {
                card.classList.add('blink-danger');
            } else {
                card.classList.remove('blink-danger');
            }
        }
            window.onload = refreshData;
    </script>
</body>
</html>
