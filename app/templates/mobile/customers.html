{% extends "mobile/base.html" %}

{% block title %}Customers - AxisStock Mobile{% endblock %}

{% block page_content %}
  <h3 style="font-weight:800;font-size:16px">Customers</h3>
  <div id="custList" style="margin-top:12px">Loading...</div>
{% endblock %}

{% block scripts %}
<script>
async function loadCustomers(){
  try{ const res = await fetch(window.location.href); const html = await res.text(); document.getElementById('custList').innerHTML = '<div class="empty-state">Open customers in desktop for full profile</div>'; }
  catch(e){ document.getElementById('custList').innerHTML = '<div class="empty-state">Failed to load</div>' }
}
document.addEventListener('DOMContentLoaded', loadCustomers);
</script>
