<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>{% block title %}AxisStock Mobile{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/mobile.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="mobile-container">
    <header class="mobile-header">
      <div class="brand">AxisStock</div>
      <div class="actions">{% block header_actions %}{% endblock %}</div>
    </header>

    <main>
      {% block page_content %}{% endblock %}
    </main>

    {% if active_page %}
    <nav class="mobile-nav">
      <a href="/pos" class="nav-link {% if active_page == 'pos' %}active{% endif %}">POS</a>
      <a href="/inventory" class="nav-link {% if active_page == 'inventory' %}active{% endif %}">Stock</a>
      <a href="/sales" class="nav-link {% if active_page == 'sales' %}active{% endif %}">Sales</a>
      <a href="/customers" class="nav-link {% if active_page == 'customers' %}active{% endif %}">Customers</a>
      <a href="/analytics" class="nav-link {% if active_page == 'analytics' %}active{% endif %}">Reports</a>
    </nav>
    {% endif %}
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
