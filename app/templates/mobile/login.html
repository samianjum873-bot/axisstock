{% extends "mobile/base.html" %}

{% block title %}Login - AxisStock Mobile{% endblock %}

{% block page_content %}
  <div style="margin-top:40px">
    <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Sign in</h2>
    <p style="color:var(--muted);margin-bottom:18px;font-size:13px">Access your store on the go — streamlined mobile UI.</p>

    <form method="post" action="/login">
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px">Username</label>
        <input name="username" type="text" required class="search-box" />
      </div>
      <div style="margin-bottom:18px">
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px">Password</label>
        <input name="password" type="password" required class="search-box" />
      </div>
      <button type="submit" class="cart-bar" style="position:static;display:block;text-align:center;padding:12px;border-radius:10px;background:var(--brand);width:100%;font-weight:800">Sign in</button>
    </form>

    <div style="margin-top:18px;text-align:center;font-size:12px;color:var(--muted)">If you have trouble logging in, contact your admin.</div>
  </div>
{% endblock %}
