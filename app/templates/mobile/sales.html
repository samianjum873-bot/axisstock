{% extends "mobile/base.html" %}

{% block title %}Sales - AxisStock Mobile{% endblock %}

{% block page_content %}
  <div class="card-block">
    <div class="page-title">Sales History</div>
    <div class="page-subtitle">Review the latest transactions at a glance.</div>
  </div>

  <div id="salesList" class="grid-list" style="margin-top:14px">Loading...</div>
{% endblock %}

{% block scripts %}
<script>
async function loadSales(){
  try{
    const res = await fetch('/api/sales-recent');
    const data = await res.json();
    renderSales(data);
  }catch(e){
    document.getElementById('salesList').innerHTML = '<div class="empty-state">Failed to load sales</div>';
  }
}
function renderSales(list){
  if(!list.length){
    document.getElementById('salesList').innerHTML = '<div class="empty-state">No recent sales</div>';
    return;
  }
  document.getElementById('salesList').innerHTML = list.map(s => `
    <div class="prod">
      <div class="card-row">
        <div class="name">${s.receipt_number}</div>
        <span class="status-pill">${s.payment_status}</span>
      </div>
      <div class="meta">Rs. ${s.total_amount} • ${s.student_name || 'Customer'}</div>
      <div class="meta" style="font-size:12px">${s.timestamp}</div>
    </div>
  `).join('');
}
document.addEventListener('DOMContentLoaded', loadSales);
</script>
