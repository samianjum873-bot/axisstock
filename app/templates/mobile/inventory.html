{% extends "mobile/base.html" %}

{% block title %}Inventory - AxisStock Mobile{% endblock %}

{% block page_content %}
  <div class="card-block">
    <div class="page-title">Stock Manager</div>
    <div class="page-subtitle">Search and review inventory items quickly.</div>
  </div>

  <div style="margin-top:16px">
    <input id="invSearch" class="search-box" placeholder="Search by name or SKU" oninput="renderInv()">
  </div>

  <div id="invList" class="grid-list" style="margin-top:14px">Loading...</div>
{% endblock %}

{% block scripts %}
<script>
let inv = [];
async function loadInv(){
  try{
    const res = await fetch('/api/inventory');
    inv = await res.json();
    renderInv();
  }catch(e){
    document.getElementById('invList').innerHTML = '<div class="empty-state">Failed loading inventory</div>';
  }
}
function renderInv(){
  const q = document.getElementById('invSearch').value.toLowerCase();
  const list = inv.filter(p => !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || (p.category && p.category.toLowerCase().includes(q)));
  if(!list.length){
    document.getElementById('invList').innerHTML = '<div class="empty-state">No items found</div>';
    return;
  }
  document.getElementById('invList').innerHTML = list.map(p => `
    <a href="/product/${p.id}" class="prod">
      <div class="name">${p.name}</div>
      <div class="meta">SKU: ${p.sku} • Stock: ${p.stock}</div>
      <div class="card-row" style="margin-top:12px;align-items:center;">
        <div class="card-title">Rs. ${p.selling_price}</div>
        <div class="status-pill">${p.category || 'General'}</div>
      </div>
    </a>`).join('');
}

document.addEventListener('DOMContentLoaded', loadInv);
</script>
