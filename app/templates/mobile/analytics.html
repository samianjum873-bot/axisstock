{% extends "mobile/base.html" %}

{% block title %}Analytics - AxisStock Mobile{% endblock %}

{% block page_content %}
  <h3 style="font-weight:800;font-size:16px">Analytics</h3>
  <div style="margin-top:12px">
    <div class="prod" style="padding:12px"><div class="name">Stock Value</div><div class="meta">Rs. {{ stats.stock_valuation }}</div></div>
    <div class="prod" style="padding:12px;margin-top:8px"><div class="name">Low Stock Items</div><div class="meta">{{ low_stock_items|length }}</div></div>
    <div class="prod" style="padding:12px;margin-top:8px"><div class="name">Profit (selected)</div><div class="meta">Rs. {{ stats.net_profit }}</div></div>
  </div>
{% endblock %}
