<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AXIS STOCK</title>
    <script src="/static/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="/static/css/font-awesome.min.css">
</head>
<body class="bg-indigo-900 h-screen flex items-center justify-center backdrop-blur-sm bg-gradient-to-br from-indigo-950 via-indigo-900 to-slate-900">
    
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 border-4 border-indigo-950">
        <h1 class="text-3xl font-black text-center text-indigo-950 mb-1 tracking-tight italic">AXIS <span class="text-indigo-600 font-normal">Stock</span></h1>
        <p class="text-center text-gray-400 mb-6 font-black text-[10px] uppercase tracking-widest">POS Security Access Terminal</p>
        
        <!-- Professional Error Alert Banner -->
        <div id="errorAlert" class="hidden bg-rose-50 border-2 border-rose-500 p-3 rounded-xl mb-4 flex items-center space-x-2 text-rose-700 animate-pulse">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMsg" class="text-xs font-black uppercase">Invalid Terminal Credentials!</span>
        </div>
        
        <form action="/login" method="post" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1">Operator Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" name="username" placeholder="Enter username..." class="w-full border-2 pl-10 pr-4 py-3 rounded-xl focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 outline-none font-bold text-sm bg-slate-50 transition-all" required>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1">Access Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-gray-400"></i>
                    <input type="password" name="password" placeholder="••••••••" class="w-full border-2 pl-10 pr-4 py-3 rounded-xl focus:border-indigo-600 focus:ring-2 focus:ring-indigo-100 outline-none font-bold text-sm bg-slate-50 transition-all" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-xl uppercase tracking-wider text-sm flex items-center justify-center gap-2">
                <i class="fas fa-door-open"></i> Authenticate & Enter
            </button>
        </form>
    </div>

    <script>
        // Professional URL Parameter Scanner for Errors
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const errorCode = urlParams.get('error');
            if (errorCode) {
                const alertBox = document.getElementById('errorAlert');
                const msgSpan = document.getElementById('errorMsg');
                if (errorCode === '1') msgSpan.innerText = 'Invalid Username or Password!';
                else if (errorCode === 'inactive') msgSpan.innerText = 'Account Disabled! Contact Admin.';
                else if (errorCode === 'admin_not_allowed') msgSpan.innerText = 'Admin cannot login from subuser domain.';
                else if (errorCode === 'subuser_not_allowed') msgSpan.innerText = 'Sub-users must login via subuser domain.';
                else msgSpan.innerText = 'Access Denied!';
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
